services:
  - type: web
    name: rs-video-compressor
    runtime: python
    repo: https://github.com/yourusername/rs-video-compressor
    plan: free
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: PORT
        value: 8080
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
